apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab14-crypto-collector
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lab14-crypto-collector
  template:
    metadata:
      labels:
        app: lab14-crypto-collector
    spec:
      containers:
        - name: collector
          image: lab14-crypto-collector:latest
          imagePullPolicy: IfNotPresent
          args:
            - "-symbols=BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT,ADAUSDT"
            - "-workers=2"
            - "-window=1m"
            - "-max-records=120"
          resources:
            requests:
              cpu: 100m
              memory: 96Mi
            limits:
              cpu: 500m
              memory: 256Mi

