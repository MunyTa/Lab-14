apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: lab14-crypto-collector
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: lab14-crypto-collector
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65

